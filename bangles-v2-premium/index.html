<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BangleByChoice V2 | Premium Edition</title>

    <!-- Tailwind v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fonts: Playfair Display (Serif/Luxury) & Mulish (Sans/Modern) -->
    <link
        href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,600;0,800;1,400&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        /* Premium Customizations */
        :root {
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Mulish', sans-serif;
        }

        body {
            font-family: var(--font-sans);
            -webkit-tap-highlight-color: transparent;
        }

        .font-serif {
            font-family: var(--font-serif);
        }

        /* Hide Scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Smooth Fade In */
        .fade-enter {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-stone-50 font-sans text-slate-800 antialiased selection:bg-rose-200 selection:text-rose-900 pb-24">

    <!-- Toast Notification -->
    <div id="toast-container"
        class="fixed top-4 left-1/2 -translate-x-1/2 z-50 transition-all duration-300 transform -translate-y-24 opacity-0 pointer-events-none">
        <div
            class="bg-slate-900/90 backdrop-blur text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 min-w-[200px] justify-center">
            <i id="toast-icon" class="fa-solid fa-check text-emerald-400"></i>
            <span id="toast-message" class="text-sm font-bold tracking-wide">Added to Bag</span>
        </div>
    </div>

    <!-- APP SHELL -->
    <div id="app-shell"
        class="h-screen flex flex-col relative overflow-hidden mx-auto max-w-md md:max-w-full md:border-x md:border-slate-200 bg-white md:shadow-2xl">

        <!-- HEADER (Premium Sticky) -->
        <header class="absolute top-0 left-0 w-full z-50 transition-all duration-300" id="main-header">
            <!-- Top Row: Logo & Actions -->
            <div class="glass border-b border-stone-100/50 px-5 py-4 flex justify-between items-center">
                <!-- Menu / Search Intent -->
                <button
                    class="w-10 h-10 rounded-full flex items-center justify-center text-slate-800 hover:bg-stone-100 transition">
                    <i class="fa-solid fa-bars-staggered text-lg"></i>
                </button>

                <!-- Brand Logo -->
                <div class="flex flex-col items-center">
                    <h1 class="font-serif font-bold text-2xl tracking-tight text-rose-950 leading-none">Bangle<span
                            class="italic font-normal text-rose-600">by</span>Choice</h1>
                    <span class="text-[9px] tracking-[0.2em] uppercase text-slate-400 mt-1">Version 2.0</span>
                </div>

                <!-- Bag/Cart -->
                <button
                    class="w-10 h-10 rounded-full flex items-center justify-center text-slate-800 hover:bg-stone-100 transition relative">
                    <i class="fa-solid fa-bag-shopping text-xl"></i>
                    <span id="cart-badge"
                        class="absolute top-2 right-2 w-2.5 h-2.5 bg-rose-600 rounded-full border-2 border-white hidden"></span>
                </button>
            </div>

            <!-- Context Switcher (Pill Toggle) -->
            <div class="bg-white/95 backdrop-blur-sm border-b border-stone-100 py-3 px-6 flex justify-center shadow-xs">
                <div class="flex bg-stone-100 p-1 rounded-full w-full max-w-xs relative">
                    <!-- Sliding Background (JS will move this) -->
                    <div id="toggle-indicator"
                        class="absolute top-1 left-1 bottom-1 w-[calc(50%-4px)] bg-white rounded-full shadow-sm transition-transform duration-300 ease-out z-0">
                    </div>

                    <button onclick="switchContext('jewelry')" id="btn-jewelry"
                        class="flex-1 relative z-10 text-xs font-bold uppercase tracking-wider py-2.5 text-rose-950 transition-colors text-center">
                        Jewelry
                    </button>
                    <button onclick="switchContext('materials')" id="btn-materials"
                        class="flex-1 relative z-10 text-xs font-bold uppercase tracking-wider py-2.5 text-slate-400 transition-colors text-center">
                        Materials
                    </button>
                </div>
            </div>
        </header>

        <!-- MAIN SCROLL AREA -->
        <main id="main-content" class="flex-1 overflow-y-auto overflow-x-hidden pt-[130px] pb-24 scroll-smooth">

            <!-- Hero Section (Editorial Style) -->
            <section id="hero-section" class="px-4 mb-8">
                <div class="relative h-[450px] rounded-[2rem] overflow-hidden shadow-2xl shadow-rose-900/10 group">
                    <img src="https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                        alt="Luxury Bangles" class="w-full h-full object-cover">
                    <!-- Gradient Overlay -->
                    <div class="absolute inset-0 bg-linear-to-t from-black/60 via-black/10 to-transparent"></div>

                    <!-- Content -->
                    <div class="absolute bottom-0 left-0 w-full p-8 text-center">
                        <span
                            class="inline-block px-3 py-1 bg-white/20 backdrop-blur-md text-white text-[10px] uppercase font-bold tracking-widest rounded-full mb-3 border border-white/30">New
                            Collection</span>
                        <h2 class="font-serif text-4xl text-white mb-2 leading-tight">Royal Threads</h2>
                        <button
                            class="mt-4 px-8 py-3 bg-white text-rose-950 font-bold text-xs uppercase tracking-widest rounded-full hover:bg-rose-50 transition shadow-lg">
                            Shop Now
                        </button>
                    </div>
                </div>
            </section>

            <!-- Horizontal Filter Scroll (Visual Chips) -->
            <section class="max-w-full overflow-x-hidden mb-6">
                <div class="flex gap-4 px-6 overflow-x-auto no-scrollbar py-2" id="quick-filters">
                    <!-- Injected via JS -->
                    <button
                        class="shrink-0 w-16 h-16 rounded-full border border-stone-200 p-0.5 flex flex-col items-center justify-center gap-1 group">
                        <div
                            class="w-full h-full rounded-full bg-stone-100 flex items-center justify-center group-hover:bg-rose-50 transition">
                            <i class="fa-solid fa-sliders text-slate-400 group-hover:text-rose-600"></i>
                        </div>
                    </button>
                </div>
            </section>

            <!-- Product Grid -->
            <section class="px-4">
                <div class="flex justify-between items-end mb-4 px-2">
                    <h3 class="font-serif text-xl text-slate-900 italic">Trending Now</h3>
                    <span class="text-xs text-slate-400 font-bold uppercase tracking-wider">Show All</span>
                </div>

                <div id="product-grid" class="grid grid-cols-2 gap-x-4 gap-y-8">
                    <!-- Cards via JS -->
                </div>
            </section>

        </main>

        <!-- BOTTOM ACTIONS (Floating) -->
        <div class="absolute bottom-6 left-0 w-full flex justify-center z-50 px-6 pointer-events-none">
            <div
                class="pointer-events-auto bg-slate-900/90 backdrop-blur-md text-white px-2 py-2 rounded-full shadow-2xl flex items-center gap-2 pr-6">
                <div
                    class="w-10 h-10 bg-rose-600 rounded-full flex items-center justify-center shadow-lg animate-pulse">
                    <i class="fa-solid fa-bag-shopping text-sm"></i>
                </div>
                <div class="flex flex-col">
                    <span class="text-[10px] text-slate-300 font-bold uppercase tracking-wider">My Bag</span>
                    <span class="text-xs font-bold">2 Items • ₹1,499</span>
                </div>
            </div>
        </div>

    </div>

    <!-- SCRIPTS -->
    <script src="main.js"></script>
</body>

</html>
